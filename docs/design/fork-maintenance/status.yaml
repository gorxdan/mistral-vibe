schema_version: 1

campaign:
  id: fork-maintenance
  title: Fork Maintenance and Quality Campaign
  state: planning
  iteration: 0
  roadmap: ../fork-maintenance-roadmap.md
  execution_guide: README.md
  authority_matrix: authority-matrix.md
  packet_template: task-packet-template.md
  status_owner: campaign-lead
  last_updated: 2026-07-12

planning_snapshot:
  head_sha: 2a1f4e1ab37bd9b6ba45a0b074501104014b44b6
  upstream_sha: ac8f1a09fdfbadb6d4508a555ba6607fd05eb0dc
  note: >-
    These SHAs identify the repository inspected while authoring the execution
    layer. They do not authorize an implementation baseline.

control_plane:
  branch: maintenance/fork-maintenance-control
  worktree: null
  commit_identity_source: >-
    CONTROL_SHA is supplied by the lead outside this file and verified with
    git rev-parse in the clean control worktree.
  candidate_policy: Candidate branches never modify or merge control commits.

campaign_identity:
  campaign_baseline_sha: null
  upstream_sha: null
  final_evidence_workspace: null
  final_run_id: null
  final_runner_id: null
  final_manifest_sha256: null
  retention_policy: >-
    Preserve the authoritative external run read-only through campaign close and
    the next upstream-sync rehearsal; moving it requires a control-plane update
    with old/new paths and matching digest.
  evidence_root_template: >-
    $VIBE_EVIDENCE_WORKSPACE/.ai/runs/$KILROY_RUN_ID/test-evidence/latest
  note: >-
    Final campaign identity is frozen only after Iteration 0 consolidation.
    Each packet records a separate baseline, candidate, and unique evidence run.

readiness:
  state: blocked
  blockers:
    - id: execution-layer-not-frozen
      resolution: Review and commit the execution-layer documentation.
    - id: control-worktree-not-assigned
      resolution: Create and record the clean dedicated control worktree/branch.
    - id: first-packet-identity-not-assigned
      resolution: >-
        Fill I00-P01 baseline/upstream SHA, external workspace, unique run ID,
        stable runner ID, worktree, and branch in both packet and status.
    - id: first-packet-roles-not-assigned
      resolution: Assign the I00-P01 worker, reviewer, verifier, evidence operator, and execution profile.

state_definitions:
  draft: Incomplete or unauthorized; implementation must not begin.
  ready: Lead-frozen and assigned; worker may begin after successful preflight.
  active: Assigned worker passed preflight and is operating within packet scope.
  verification: >-
    Candidate/repository access is read-only; the assigned evidence operator
    may run the frozen scenario and write only assigned external artifacts.
  complete: Lead accepted required evidence and a current verifier PASS.
  blocked: Work stopped pending an explicit lead decision or external prerequisite.

transition_authority:
  draft_to_ready: campaign-lead
  ready_to_blocked: campaign-lead-records-worker-preflight-report
  ready_to_active: campaign-lead-records-worker-request
  active_to_verification: campaign-lead-records-worker-request
  active_or_verification_to_blocked: campaign-lead-records-report
  blocked_to_ready_or_active: campaign-lead
  verification_to_complete: campaign-lead-after-verifier-pass

