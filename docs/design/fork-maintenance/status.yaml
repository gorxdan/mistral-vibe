schema_version: 1

campaign:
  id: fork-maintenance
  title: Fork Maintenance and Quality Campaign
  state: planning
  iteration: 0
  roadmap: ../fork-maintenance-roadmap.md
  execution_guide: README.md
  authority_matrix: authority-matrix.md
  packet_template: task-packet-template.md
  status_owner: campaign-lead
  last_updated: 2026-07-12

planning_snapshot:
  head_sha: 2a1f4e1ab37bd9b6ba45a0b074501104014b44b6
  upstream_sha: ac8f1a09fdfbadb6d4508a555ba6607fd05eb0dc
  note: >-
    These SHAs identify the repository inspected while authoring the execution
    layer. They do not authorize an implementation baseline.

execution_identity:
  baseline_sha: null
  upstream_sha: null
  evidence_workspace: null
  run_id: null
  evidence_root_template: >-
    $VIBE_EVIDENCE_WORKSPACE/.ai/runs/$KILROY_RUN_ID/test-evidence/latest
  branch: null
  worktree: null

readiness:
  state: blocked
  blockers:
    - id: execution-layer-not-frozen
      resolution: Review and commit the execution-layer documentation.
    - id: baseline-not-frozen
      resolution: Record the resulting clean 40-character baseline SHA.
    - id: upstream-not-frozen
      resolution: Confirm and record the exact upstream SHA for Iteration 0.
    - id: evidence-root-not-assigned
      resolution: Assign an absolute workspace outside the repository and all worktrees.
    - id: run-id-not-assigned
      resolution: Assign a unique evidence run ID.
    - id: packet-roles-not-assigned
      resolution: Assign worker, reviewer, verifier, worktree, branch, and execution profile per packet.

state_definitions:
  draft: Incomplete or unauthorized; implementation must not begin.
  ready: Lead-frozen and assigned; worker may begin after successful preflight.
  active: Assigned worker passed preflight and is operating within packet scope.
  verification: Candidate is frozen and only read-only verification may run.
  complete: Lead accepted required evidence and a current verifier PASS.
  blocked: Work stopped pending an explicit lead decision or external prerequisite.

transition_authority:
  draft_to_ready: campaign-lead
  ready_to_active: campaign-lead-records-worker-request
  active_to_verification: campaign-lead-records-worker-request
  active_or_verification_to_blocked: campaign-lead-records-report
  blocked_to_ready_or_active: campaign-lead
  verification_to_complete: campaign-lead-after-verifier-pass

packets:
  - id: I00-P01
    title: External evidence runner and contract
    path: packets/I00-P01-evidence-runner.md
    state: draft
    change_class: tooling
    risk: medium
    depends_on: []
    owner: null
    reviewer: null
    verifier: null
    worktree: null
    branch: null
    execution_profile: null
    required_scenarios:
      - IT-13
    readiness_blockers:
      - campaign execution identity is incomplete
      - roles and isolated worktree are unassigned

  - id: I00-P02
    title: Baseline identity and fork inventory
    path: packets/I00-P02-baseline-inventory.md
    state: draft
    change_class: tooling
    risk: medium
    depends_on:
      - I00-P01
    owner: null
    reviewer: null
    verifier: null
    worktree: null
    branch: null
    execution_profile: null
    required_scenarios:
      - IT-12
    readiness_blockers:
      - I00-P01 is not complete
      - campaign execution identity is incomplete
      - roles and isolated worktree are unassigned

  - id: I00-P03
    title: Programmatic CLI subprocess characterization
    path: packets/I00-P03-programmatic-cli-characterization.md
    state: draft
    change_class: characterization
    risk: medium
    depends_on:
      - I00-P01
    owner: null
    reviewer: null
    verifier: null
    worktree: null
    branch: null
    execution_profile: null
    required_scenarios:
      - IT-01
    readiness_blockers:
      - I00-P01 is not complete
      - campaign execution identity is incomplete
      - roles and isolated worktree are unassigned

iteration_0_order:
  - Complete I00-P01 first.
  - Freeze the campaign baseline and external evidence identity.
  - Run I00-P02 and I00-P03 serially or in nonoverlapping isolated worktrees.
  - Serialize manifest updates and status changes through the campaign lead.

global_prohibitions:
  - No packet implementation while its state is draft.
  - No shared-worktree concurrent writers.
  - No evidence inside the repository or a linked worktree.
  - No paid model or live-network execution for the first three packets.
  - No upstream-owned deletion, rename, split, relocation, or broad reformat.
  - No snapshot, message baseline, performance threshold, or accepted-divergence update by a worker.
  - No candidate mutation after verification starts.
  - No worker, reviewer, or verifier may mark a packet complete or authorize landing.
