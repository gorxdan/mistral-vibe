required_future_packets:
  - id: I00-P04
    title: Bound programmatic backend errors at the real CLI entry point
    state: not_authored
    must_precede:
      - I00-P03
    required_outcomes:
      - catch the typed backend error at the narrow programmatic CLI boundary
      - emit the exact MSG-01 backend-auth error with exit 1 and no traceback
      - add focused production/unit/subprocess regression evidence
      - preserve interactive, failover, provider, request, and retry behavior
      - limit the upstream-owned edit to one localized exception-boundary hunk with no reordering
  - id: I00-P99
    title: Iteration 0 consolidation and authoritative baseline freeze
    state: not_authored
    must_precede:
      - I01-P01
    required_outcomes:
      - consolidate every accepted Iteration 0 candidate on one clean commit
      - run the complete Iteration 0 scenario and gap crosscheck
      - produce snapshot-success.json on a clean pass and retain snapshot-report.html only on failure
      - rerun fork inventory against the consolidated commit
      - capture a new final manifest with baseline_sha equal to candidate_sha
      - bind and retain the final verifier report and manifest digest
      - promote campaign_baseline_sha in the control status

iteration_0_order:
  - Complete I00-P01 first.
  - Freeze each packet's clean starting SHA and packet-unique evidence identity.
  - Run I00-P02 and author/complete I00-P04 in nonoverlapping rollback boundaries.
  - Run I00-P03 only after I00-P04 is complete and included in its baseline.
  - Consolidate all Iteration 0 changes and run the complete Iteration 0 gates.
  - Freeze campaign_baseline_sha at the clean consolidated commit.
  - Assign a new final_run_id and rerun baseline inventory/capture with manifest baseline_sha equal to candidate_sha.
  - Serialize manifest updates and status changes through the campaign lead.

global_prohibitions:
  - No packet implementation while its state is draft.
  - No shared-worktree concurrent writers.
  - No evidence inside the repository or a linked worktree.
  - No paid model or external-network execution for the first three packets; deterministic loopback fixtures are allowed where a packet names them.
  - No upstream-owned deletion, rename, split, relocation, or broad reformat.
  - No snapshot, message baseline, performance threshold, or accepted-divergence update by a worker.
  - No candidate mutation after verification starts.
  - No worker, reviewer, or verifier may mark a packet complete or authorize landing.
